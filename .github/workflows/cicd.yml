      - run: npm test -- __tests__/database/storage.test.ts

  # =========================
  # ⚡ Realtime Tests
  # =========================
  realtime-connection:
    name: Test Connection Manager
    needs: [TestBuild]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
